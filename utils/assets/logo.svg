  <path d="M20 24 h30 a4 4 0 0 1 4 4 v14 a4 4 0 0 1 -4 4 h-12 l-5 6 -1 -6 h-12 a4 4 0 0 1 -4 -4 v-14 a4 4 0 0 1 4 -4 z" fill="#FFFFFF" stroke="#2E7D32" stroke-width="1.6"></path>

