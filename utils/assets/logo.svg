  <line x1="24" y1="30" x2="44" y2="30" stroke="#CFD8DC" stroke-width="2" stroke-linecap="round"></line>
  <line x1="24" y1="35" x2="44" y2="35" stroke="#CFD8DC" stroke-width="2" stroke-linecap="round"></line>
